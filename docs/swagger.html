<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SequenceServer API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f8fafc;
        font-family: "Noto Sans SC", "Source Sans 3", sans-serif;
      }

      .topbar {
        padding: 16px 24px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        background: #ffffff;
      }

      .topbar h1 {
        margin: 0;
        font-size: 20px;
        color: #0f172a;
      }

      .topbar p {
        margin: 6px 0 0;
        color: #475569;
      }

      #swagger-ui {
        max-width: 1440px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>SequenceServer API 文档</h1>
      <p>OpenAPI / Swagger UI. 规范文件地址: <code>/api/openapi.json</code></p>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "/api/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        docExpansion: "list",
        displayRequestDuration: true,
        tryItOutEnabled: true
      });
    </script>
  </body>
  </html>
